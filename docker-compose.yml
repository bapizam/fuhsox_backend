version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fuhsox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     fuhsox
      POSTGRES_PASSWORD: fuhsox_dev_pass
      POSTGRES_DB:       fuhsox
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script: creates fuhsox_test database alongside fuhsox on first boot
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fuhsox']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: fuhsox_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: fuhsox
      MONGO_INITDB_ROOT_PASSWORD: fuhsox_dev_pass
      MONGO_INITDB_DATABASE:     fuhsox
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fuhsox_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass fuhsox_redis_pass
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'fuhsox_redis_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: fuhsox_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP server
      - '8025:8025'   # Web UI for inspecting emails

volumes:
  postgres_data:
  mongo_data:
  redis_data:
